server:
  port: 8080
  tomcat:
    max-connections: 8192
    connection-timeout: 20000
    min-spare-threads: 10
    reject-illegal-header-name: true
    reject-illegal-header-value: true
    relaxed-query-chars: "[,],|"
    relaxed-path-chars: "[,],|"
    max-parameter-count: 10000

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: 1000
  messages:
    encoding: UTF-8

jwt:
  signerKey: ${JWT_SIGNER_KEY}
  valid-duration: ${JWT_VALID_DURATION:3600}
  refreshable-duration: ${JWT_REFRESHABLE_DURATION:36000}

payos:
  client-id: ${PAYOS_CLIENT_ID:dummy-client-id}
  api-key: ${PAYOS_API_KEY:dummy-api-key}
  checksum-key: ${PAYOS_CHECKSUM_KEY:dummy-checksum-key}