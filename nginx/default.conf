# === Stage 1: HTTP only (for initial SSL cert) ===
# After getting SSL cert, replace with the full config below.

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # For Certbot SSL challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS (enable after SSL is set up)
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # Temporary: proxy to app while getting SSL
    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

